spring:
  application:
    name: SupportDesk
  datasource:
    url: jdbc:h2:mem:supportdesk;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      # For this course demo we let Hibernate keep the local H2 schema in sync.
      # This avoids Spring Boot startup crashes when Flyway validation and entity changes differ.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true
  flyway:
    # Disabled for the local demo build because the app is using H2 and the entity model
    # changes frequently during development. SQL migrations are still kept in db/migration.
    enabled: false
    baseline-on-migrate: true
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 86400000
server:
  port: 8080
springdoc:
  swagger-ui:
    path: /swagger-ui.html
